name: islamic_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.3+3

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.2
  go_router: ^17.3.0
  sqflite: ^2.4.3
  path: ^1.9.1
  path_provider: ^2.1.5
  shared_preferences: ^2.5.5
  flutter_local_notifications: ^22.0.0
  timezone: ^0.11.0
  permission_handler: ^12.0.3
  geolocator: ^14.0.3
  flutter_compass: ^0.8.1
  dio: ^5.9.2
  url_launcher: ^6.3.2
  intl: ^0.20.2
  firebase_core: ^4.11.0
  cloud_firestore: ^6.6.0
  flutter_localizations:
    sdk: flutter
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/app/logo.png
  adaptive_icon_background: "#EAF6FF"
  adaptive_icon_foreground: assets/app/logo.png

flutter:
  uses-material-design: true
  assets:
    - assets/data/turkish_locations.json
    - assets/data/mock_prayer_times.json
    - assets/data/quran_index.json
    - assets/data/quran_surahs/
    - assets/data/duas_sample.json
    - assets/data/islamic_knowledge_sample.json
    - assets/data/daily_content_sample.json
    - assets/data/hadith_nawawi_tr.json
    - assets/data/wallpapers_sample.json
    - assets/data/mock_mosques.json
    - assets/app/logo.png
    - assets/wallpapers/
    - assets/wallpapers/thumbs/
